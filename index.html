<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EASY GOING GROUP - Penilaian Kinerja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0f1d;
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0a0f1d, #020617);
            color: #f8fafc;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
            transform: translateY(-4px);
        }

        .animated-gradient {
            background: linear-gradient(-45deg, #3b82f6, #8b5cf6, #ec4899, #3b82f6);
            background-size: 400% 400%;
            animation: gradient-flow 15s ease infinite;
        }

        @keyframes gradient-flow {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .custom-select-button {
            transition: all 0.3s ease;
        }

        #evaluatorList div:hover {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.2), transparent);
            color: #60a5fa;
            padding-left: 1.5rem;
        }

        #evaluatorList div {
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .floating-submit {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 50;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div class="fade-in">
                <h1 class="text-4xl font-extrabold tracking-tighter italic">
                    EASY GOING <span class="text-transparent bg-clip-text animated-gradient">GROUP</span>
                </h1>
                <p class="text-slate-400 text-sm font-medium mt-1 uppercase tracking-widest">Sistem Penilaian Kinerja
                    Karyawan</p>
            </div>
            <div id="statusBadge"
                class="fade-in glass-card px-5 py-2 rounded-2xl flex items-center gap-3 text-sm font-bold shadow-lg">
                <span id="statusDot" class="relative flex h-3 w-3">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
                </span>
                <span id="statusText">Menghubungkan...</span>
            </div>
        </header>

        <section class="mb-12 fade-in" style="animation-delay: 0.1s">
            <div class="glass-card p-6 rounded-3xl shadow-2xl relative">
                <label class="block text-xs font-black text-blue-400 uppercase tracking-[0.2em] mb-4">Identitas Penilai
                    (SPV / Manager)</label>

                <div class="relative" id="customSelectWrapper">
                    <button id="selectButton"
                        class="w-full bg-slate-900/50 text-left text-white border border-slate-700/50 rounded-2xl p-4 text-xl font-bold flex justify-between items-center focus:ring-4 focus:ring-blue-500/20 transition-all custom-select-button">
                        <span id="selectedName">Pilih Nama Anda...</span>
                        <svg class="w-6 h-6 text-slate-500 transition-transform" id="selectArrow" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                            </path>
                        </svg>
                    </button>

                    <div id="selectMenu"
                        class="hidden absolute top-full left-0 right-0 mt-3 glass-card rounded-2xl shadow-2xl z-[100] overflow-hidden border border-blue-500/30">
                        <div class="p-3 border-b border-slate-700/50 bg-slate-900/80">
                            <input type="text" id="searchEvaluator" placeholder="Cari nama Anda..."
                                class="w-full bg-slate-800 text-white border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div id="evaluatorList"
                            class="max-h-64 overflow-y-auto p-2 space-y-1 bg-slate-900/90 backdrop-blur-xl">
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div id="matrixSection" class="opacity-30 pointer-events-none transition-all duration-700">
            <div class="flex justify-between items-end mb-6 fade-in" style="animation-delay: 0.2s">
                <div>
                    <h2 class="text-2xl font-bold text-white tracking-tight">Daftar Karyawan</h2>
                    <p class="text-slate-500 text-sm">Pilih nama karyawan untuk memberikan penilaian bulanan.</p>
                </div>
                <div class="glass-card px-4 py-1.5 rounded-xl border-blue-500/30">
                    <span class="text-xs font-bold text-blue-400 uppercase tracking-widest">Antrean: </span>
                    <span id="totalKaryawan" class="text-lg font-black">0</span>
                </div>
            </div>

            <div id="karyawanContainer" class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-32 fade-in"
                style="animation-delay: 0.3s">
            </div>
        </div>
    </div>

    <div id="submitContainer" class="floating-submit opacity-0 transition-all duration-500 scale-90 translate-y-10">
        <button id="btnSubmit"
            class="animated-gradient text-white px-8 py-4 rounded-2xl font-black text-lg shadow-[0_0_30px_rgba(59,130,246,0.5)] hover:scale-105 active:scale-95 transition-all flex items-center gap-3">
            <span>KIRIM PENILAIAN</span>
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z">
                </path>
            </svg>
        </button>
    </div>

    <script>
        // GANTI DENGAN URL WEB APP ANDA SENDIRI
        const API_URL = "https://script.google.com/macros/s/AKfycbzEPU2KKfFlBBLekUgN-nVUVW_btEoMTMrqOPDoj81hUyt6sqvGgS35PApo9sNeDbqG/exec";

        const metrics = {
            ss: ['Komunikasi dengan rekan & atasan', 'Kerja sama tim', 'Tanggung jawab & manajemen waktu', 'Inisiatif & penyelesaian masalah'],
            hs: ['Penguasaan tugas & SOP', 'Ketelitian & kecepatan kerja', 'Kemampuan menggunakan alat/sistem', 'Konsistensi hasil kerja'],
            at: ['Kedisiplinan & kehadiran', 'Kepatuhan aturan & arahan', 'Etika & profesionalitas', 'Tanggung jawab lingkungan']
        };
        const opsiNilai = ['1 (Sangat Buruk)', '2 (Buruk)', '4 (Baik)', '5 (Sangat Baik)'];
        const opsiSholat = ['Tidak Pernah', 'Jarang', '5 Waktu', 'Tepat Waktu'];

        let userData = [];
        let evaluators = [];

        window.onload = async () => {
            try {
                const response = await fetch(API_URL + "?action=getUsers");
                const result = await response.json();
                if (result.status === "success") {
                    evaluators = result.data.filter(u => u.posisi.toUpperCase().includes('MANAGER') || u.posisi.toUpperCase().includes('SPV'));
                    renderEvaluatorOptions(evaluators);
                    document.getElementById('statusText').innerText = "Sistem Siap";
                }
            } catch (e) { document.getElementById('statusText').innerText = "Link Error"; }
        };

        // CUSTOM SELECT LOGIC
        const selectBtn = document.getElementById('selectButton');
        const selectMenu = document.getElementById('selectMenu');
        const selectArrow = document.getElementById('selectArrow');

        selectBtn.onclick = () => {
            selectMenu.classList.toggle('hidden');
            selectArrow.classList.toggle('rotate-180');
        };

        function renderEvaluatorOptions(list) {
            const container = document.getElementById('evaluatorList');
            container.innerHTML = list.map(u => `
                <div class="p-4 rounded-xl text-sm font-semibold" onclick="selectEvaluator('${u.nama}')">
                    ${u.nama} <span class="text-[10px] text-slate-500 block">${u.posisi}</span>
                </div>
            `).join('');
        }

        document.getElementById('searchEvaluator').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = evaluators.filter(u => u.nama.toLowerCase().includes(val));
            renderEvaluatorOptions(filtered);
        };

        async function selectEvaluator(name) {
            document.getElementById('selectedName').innerText = name;
            selectMenu.classList.add('hidden');
            selectArrow.classList.remove('rotate-180');

            document.getElementById('statusText').innerText = "Memuat Daftar...";

            try {
                const response = await fetch(API_URL + "?action=getUsers&penilai=" + encodeURIComponent(name));
                const result = await response.json();
                userData = result.data;
                renderCards();

                document.getElementById('matrixSection').style.opacity = "1";
                document.getElementById('matrixSection').style.pointerEvents = "auto";
                document.getElementById('submitContainer').classList.remove('opacity-0', 'translate-y-10', 'scale-90');
                document.getElementById('statusText').innerText = "Terverifikasi";
            } catch (e) { alert("Gagal memuat data."); }
        }

        function renderCards() {
            const container = document.getElementById('karyawanContainer');
            container.innerHTML = '';
            document.getElementById('totalKaryawan').innerText = userData.length;

            userData.forEach((user, index) => {
                const card = document.createElement('div');
                card.className = "glass-card rounded-3xl overflow-hidden group";
                card.innerHTML = `
                    <div class="p-6 cursor-pointer flex justify-between items-center" onclick="toggleCard(${index})">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl animated-gradient flex items-center justify-center font-bold text-lg shadow-lg">
                                ${user.nama.charAt(0)}
                            </div>
                            <div>
                                <h3 class="font-bold text-white group-hover:text-blue-400 transition-colors">${user.nama}</h3>
                                <p class="text-[10px] text-slate-500 font-black uppercase tracking-widest">${user.posisi}</p>
                            </div>
                        </div>
                        <div id="status-${index}" class="text-[10px] font-bold px-3 py-1 rounded-full bg-slate-800 text-slate-500 border border-slate-700 uppercase">Menunggu</div>
                    </div>
                    <div id="content-${index}" class="hidden max-h-0 overflow-hidden transition-all duration-500 ease-in-out bg-slate-900/40 border-t border-slate-800">
                        <div class="p-6 space-y-6">
                            ${generateFields(index)}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleCard(index) {
            const content = document.getElementById(`content-${index}`);
            const isHidden = content.classList.contains('hidden');

            if (isHidden) {
                content.classList.remove('hidden');
                content.style.maxHeight = "2000px";
                content.setAttribute('data-opened', 'true');
            } else {
                content.classList.add('hidden');
                content.style.maxHeight = "0";
            }
        }

        function generateFields(index) {
            let html = `<div class="grid grid-cols-1 gap-6">`;
            ['ss', 'hs', 'at'].forEach(cat => {
                let title = cat === 'ss' ? 'Soft Skill' : cat === 'hs' ? 'Hard Skill' : 'Attitude';
                let color = cat === 'ss' ? 'blue' : cat === 'hs' ? 'purple' : 'pink';
                html += `<div>
                    <h4 class="text-[10px] font-black text-${color}-400 uppercase tracking-[0.3em] mb-4">${title}</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${metrics[cat].map((q, i) => `
                            <div class="space-y-1.5">
                                <label class="text-[11px] text-slate-400 font-medium">${q}</label>
                                <select id="${cat}${i + 1}-${index}" onchange="updateProgress(${index})" class="w-full bg-slate-900 border border-slate-700 text-xs text-white rounded-xl p-3 outline-none focus:border-blue-500 transition-all">
                                    <option value="">Nilai...</option>
                                    ${opsiNilai.map(v => `<option value="${v}">${v}</option>`).join('')}
                                </select>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            });
            html += `<div class="pt-4 border-t border-slate-800">
                <h4 class="text-[10px] font-black text-yellow-500 uppercase tracking-[0.3em] mb-4">Ibadah</h4>
                <div class="space-y-1.5">
                    <label class="text-[11px] text-slate-400 font-medium">Melaksanakan Sholat</label>
                    <select id="sholat-${index}" onchange="updateProgress(${index})" class="w-full md:w-1/3 bg-slate-900 border border-slate-700 text-xs text-white rounded-xl p-3 outline-none focus:border-yellow-500">
                        <option value="">Pilih Status...</option>
                        ${opsiSholat.map(v => `<option value="${v}">${v}</option>`).join('')}
                    </select>
                </div>
            </div></div>`;
            return html;
        }

        function updateProgress(index) {
            const status = document.getElementById(`status-${index}`);
            status.innerText = "Draft";
            status.className = "text-[10px] font-bold px-3 py-1 rounded-full bg-blue-500/10 text-blue-400 border border-blue-500/50 uppercase";
        }

        document.getElementById('btnSubmit').onclick = async () => {
            const penilai = document.getElementById('selectedName').innerText;
            const btn = document.getElementById('btnSubmit');
            let batch = [];

            userData.forEach((u, i) => {
                const ss1 = document.getElementById(`ss1-${i}`).value;
                if (ss1) {
                    batch.push({
                        penilai: penilai, yangDinilai: u.nama,
                        ss1, ss2: document.getElementById(`ss2-${i}`).value, ss3: document.getElementById(`ss3-${i}`).value, ss4: document.getElementById(`ss4-${i}`).value,
                        hs1: document.getElementById(`hs1-${i}`).value, hs2: document.getElementById(`hs2-${i}`).value, hs3: document.getElementById(`hs3-${i}`).value, hs4: document.getElementById(`hs4-${i}`).value,
                        at1: document.getElementById(`at1-${i}`).value, at2: document.getElementById(`at2-${i}`).value, at3: document.getElementById(`at3-${i}`).value, at4: document.getElementById(`at4-${i}`).value,
                        sholat: document.getElementById(`sholat-${i}`).value
                    });
                }
            });

            if (!batch.length) return alert("Pilih minimal satu karyawan dan berikan nilai.");

            btn.innerHTML = `<span>Mengirim ${batch.length} Data...</span>`;
            btn.disabled = true;

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ data: batch })
                });
                alert("Data berhasil dikirim ke database.");
                location.reload();
            } catch (e) { alert("Kesalahan koneksi."); btn.innerHTML = "KIRIM PENILAIAN"; btn.disabled = false; }
        };
    </script>
</body>

</html>
