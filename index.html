<!DOCTYPE html>
<html lang="id" id="htmlRoot">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EASY GOING GROUP - Performance Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #eef3ee; --surface: #ffffff; --surface2: #f4f8f4; --border: #d0e4d0;
            --primary: #2d6a4f; --primary-light: #52b788; --accent: #f4a261;
            --accent-dark: #e76f51; --text: #1c2b1c; --text-muted: #6b7c6b;
            --shadow: 0 4px 20px rgba(45, 106, 79, 0.08);
        }
        html.dark {
            --bg: #0d1117; --surface: #161b22; --surface2: #1c2128; --border: #2a3a2a;
            --primary: #52b788; --primary-light: #74c69d; --text: #e6edf3; --text-muted: #8b949e;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: 0.3s; }
        .card { background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow); border-radius: 24px; transition: 0.3s; }
        .btn-accent { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; border-radius: 16px; transition: 0.2s; }
        .btn-accent:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        /* Custom Select Styles */
        .csel-btn { width: 100%; display: flex; align-items: center; justify-content: space-between; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 7px 12px; height: 38px; font-size: 12px; color: var(--text-muted); cursor: pointer; }
        .csel-menu { position: absolute; top: calc(100% + 5px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; z-index: 100; max-height: 200px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .csel-item { padding: 10px; font-size: 12px; cursor: pointer; }
        .csel-item:hover { background: var(--surface2); color: var(--primary); }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>

<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 fade-in">
            <div>
                <h1 class="text-3xl font-extrabold italic tracking-tighter" style="color: var(--text)">EASY GOING <span style="color: var(--primary)">GROUP</span></h1>
                <p class="text-[10px] font-black uppercase tracking-[0.2em] text-[var(--text-muted)]">Performance Dashboard</p>
            </div>
            <button onclick="toggleTheme()" class="card p-3 rounded-2xl">
                <svg id="iconSun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" stroke-width="2"/></svg>
                <svg id="iconMoon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" stroke-width="2"/></svg>
            </button>
        </header>

        <nav class="flex gap-3 mb-8 fade-in">
            <button onclick="switchTab('penilaian')" id="tab-p" class="px-6 py-3 rounded-2xl font-bold transition-all bg-[var(--primary)] text-white shadow-lg">Input Nilai</button>
            <button onclick="switchTab('leaderboard')" id="tab-l" class="px-6 py-3 rounded-2xl font-bold transition-all bg-[var(--surface)] text-[var(--text-muted)] border border-[var(--border)] flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-width="2"/></svg>
                Rekap Nilai
            </button>
            <button onclick="switchTab('ranking')" id="tab-r" class="px-6 py-3 rounded-2xl font-bold transition-all bg-[var(--surface)] text-[var(--text-muted)] border border-[var(--border)] flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-width="2"/></svg>
                Ranking
            </button>
        </nav>

        <div id="penilaianContent">
            <section class="mb-8 fade-in">
                <div class="card p-6 relative z-[200]">
                    <label class="text-[10px] font-black uppercase tracking-widest mb-3 block text-[var(--primary)]">Identitas Penilai (SPV / Manager)</label>
                    <div class="relative">
                        <button id="selectButton" class="w-full text-left rounded-2xl p-4 text-xl font-bold flex justify-between items-center bg-[var(--surface2)] border border-[var(--border)]">
                            <span id="selectedName" class="text-[var(--text-muted)]">Pilih Nama...</span>
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2"/></svg>
                        </button>
                        <div id="selectMenu" class="hidden absolute top-full left-0 right-0 mt-2 card rounded-2xl overflow-hidden z-[300]">
                            <div id="evaluatorList" class="max-h-60 overflow-y-auto p-2"></div>
                        </div>
                    </div>
                </div>
            </section>
            
            <div id="matrixSection" class="opacity-30 pointer-events-none transition-all duration-500">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-32" id="karyawanContainer"></div>
            </div>
        </div>

        <section id="leaderboardSection" class="hidden fade-in">
            <div class="card p-6 mb-32">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">Rekap Nilai</h2>
                    <button onclick="exportToExcel()" class="btn-accent px-6 py-2.5 font-bold text-xs">EXPORT EXCEL</button>
                </div>
                <div class="flex gap-4 mb-6 items-center bg-[var(--surface2)] p-4 rounded-xl">
                    <div class="flex items-center gap-2">
                        <label class="text-xs font-bold text-[var(--text-muted)]">Dari:</label>
                        <input type="date" id="filterDateFrom" class="text-xs p-2 rounded-lg border border-[var(--border)] bg-[var(--surface)]">
                    </div>
                    <div class="flex items-center gap-2">
                        <label class="text-xs font-bold text-[var(--text-muted)]">Sampai:</label>
                        <input type="date" id="filterDateTo" class="text-xs p-2 rounded-lg border border-[var(--border)] bg-[var(--surface)]">
                    </div>
                    <button onclick="applyDateFilter()" class="px-4 py-2 bg-[var(--primary)] text-white text-xs font-bold rounded-lg hover:bg-[var(--primary-light)]">Filter</button>
                    <button onclick="resetDateFilter()" class="px-4 py-2 bg-[var(--surface)] text-[var(--text-muted)] text-xs font-bold rounded-lg border border-[var(--border)] hover:bg-[var(--surface2)]">Reset</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="text-[10px] uppercase text-[var(--text-muted)] border-b border-[var(--border)]">
                            <tr><th class="pb-4 text-left">Karyawan</th><th class="pb-4 text-center">Avg</th><th class="pb-4">Ibadah</th><th class="pb-4 text-right">Penilai</th></tr>
                        </thead>
                        <tbody id="leaderboardBody" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="rankingSection" class="hidden fade-in">
            <div class="card p-6 mb-32">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">Performance Ranking</h2>
                    <button onclick="exportRankingExcel()" class="btn-accent px-6 py-2.5 font-bold text-xs">EXPORT RANKING</button>
                </div>
                <div class="flex gap-4 mb-6 items-center bg-[var(--surface2)] p-4 rounded-xl">
                    <div class="flex items-center gap-2">
                        <label class="text-xs font-bold text-[var(--text-muted)]">Dari:</label>
                        <input type="date" id="filterDateFromRanking" class="text-xs p-2 rounded-lg border border-[var(--border)] bg-[var(--surface)]">
                    </div>
                    <div class="flex items-center gap-2">
                        <label class="text-xs font-bold text-[var(--text-muted)]">Sampai:</label>
                        <input type="date" id="filterDateToRanking" class="text-xs p-2 rounded-lg border border-[var(--border)] bg-[var(--surface)]">
                    </div>
                    <button onclick="applyDateFilterRanking()" class="px-4 py-2 bg-[var(--primary)] text-white text-xs font-bold rounded-lg hover:bg-[var(--primary-light)]">Filter</button>
                    <button onclick="resetDateFilterRanking()" class="px-4 py-2 bg-[var(--surface)] text-[var(--text-muted)] text-xs font-bold rounded-lg border border-[var(--border)] hover:bg-[var(--surface2)]">Reset</button>
                </div>
                <div id="rankingCategories" class="space-y-8">
                    <div class="category-section">
                        <h3 class="text-lg font-bold mb-4 text-[var(--primary)]">👔 SPV</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead class="text-[10px] uppercase text-[var(--text-muted)] border-b border-[var(--border)]">
                                    <tr><th class="pb-4 text-left">Nama</th><th class="pb-4 text-left">Outlet</th><th class="pb-4 text-left">Posisi</th><th class="pb-4 text-center">Predikat</th><th class="pb-4 text-center">Total Nilai</th></tr>
                                </thead>
                                <tbody id="rankingSPV" class="text-sm"></tbody>
                            </table>
                        </div>
                    </div>
                    <div class="category-section">
                        <h3 class="text-lg font-bold mb-4 text-[var(--primary)]">👷 Karyawan</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead class="text-[10px] uppercase text-[var(--text-muted)] border-b border-[var(--border)]">
                                    <tr><th class="pb-4 text-left">Nama</th><th class="pb-4 text-left">Outlet</th><th class="pb-4 text-left">Posisi</th><th class="pb-4 text-center">Predikat</th><th class="pb-4 text-center">Total Nilai</th></tr>
                                </thead>
                                <tbody id="rankingKaryawan" class="text-sm"></tbody>
                            </table>
                        </div>
                    </div>
                    <div class="category-section">
                        <h3 class="text-lg font-bold mb-4 text-[var(--primary)]">🎯 Freelance</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead class="text-[10px] uppercase text-[var(--text-muted)] border-b border-[var(--border)]">
                                    <tr><th class="pb-4 text-left">Nama</th><th class="pb-4 text-left">Outlet</th><th class="pb-4 text-left">Posisi</th><th class="pb-4 text-center">Predikat</th><th class="pb-4 text-center">Total Nilai</th></tr>
                                </thead>
                                <tbody id="rankingFreelance" class="text-sm"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <div id="submitContainer" class="fixed bottom-8 right-8 z-[50] opacity-0 translate-y-10 transition-all pointer-events-none">
        <button id="btnSubmit" class="btn-accent px-10 py-5 font-black shadow-2xl flex items-center gap-3">SIMPAN DATA</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxFHWy6sql73Wf-BIKY3eySurUgFchn5iFmB4jWHmxlTUeZyZcYMm08T4k8V4RAlTA/exec";
        const DB_KEY = "EGG_DASHBOARD_DB";
        const MANAGER_PASS = "EGG2026";
        
        let userData = [], activeCsel = null;
        const opsiNilai  = ['A (Sangat Baik)', 'B (Baik)', 'C (Cukup)', 'D (Kurang)', 'E (Sangat Kurang)'];
        const opsiSholat = ['Tidak Pernah', 'Jarang', '5 Waktu', 'Tepat Waktu'];
        const opsiPuasa  = ['Tidak Dinilai', 'Tidak Pernah', 'Bolong', 'Full'];
        
        const VALUE_COLORS = {
            'A (Sangat Baik)': '#22c55e',
            'B (Baik)':        '#3b82f6',
            'C (Cukup)':       '#f59e0b',
            'D (Kurang)':      '#f97316',
            'E (Sangat Kurang)': '#ef4444',
            'Tepat Waktu':     '#22c55e',
            '5 Waktu':         '#3b82f6',
            'Jarang':          '#f97316',
            'Tidak Pernah':    '#ef4444',
            'Full':            '#22c55e',
            'Bolong':          '#f97316',
            'Tidak Dinilai':   '#9ca3af',
        };
        
        // Predicate conversion functions
        function predicateToNumber(predicate) {
            const mapping = {
                'A (Sangat Baik)': 5,
                'B (Baik)': 4,
                'C (Cukup)': 3,
                'D (Kurang)': 2,
                'E (Sangat Kurang)': 1
            };
            return mapping[predicate] || 0;
        }
        
        function numberToPredicate(num) {
            if (num >= 4.5) return 'A (Sangat Baik)';
            if (num >= 3.5) return 'B (Baik)';
            if (num >= 2.5) return 'C (Cukup)';
            if (num >= 1.5) return 'D (Kurang)';
            return 'E (Sangat Kurang)';
        }

        // Enhanced draft management with time tracking
        function isRecentlyEvaluated(evaluator, employee, savedData, days = 30) {
            if (!savedData) return false;
            
            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - days);
            
            return savedData.some(item => 
                item.penilai === evaluator && 
                item.yangDinilai === employee && 
                item.timestamp && 
                new Date(item.timestamp) > cutoffDate
            );
        }

        // Check if employee has any evaluation (regardless of age)
        function hasEvaluation(evaluator, employee, savedData) {
            if (!savedData) return false;
            
            return savedData.some(item => 
                item.penilai === evaluator && 
                item.yangDinilai === employee
            );
        }

        // Clean up old data (older than 1 month)
        function cleanupOldData() {
            const raw = localStorage.getItem(DB_KEY);
            if (!raw) return;
            
            const data = JSON.parse(raw);
            const cutoffDate = new Date();
            cutoffDate.setMonth(cutoffDate.getMonth() - 1); // 1 month ago
            
            const filteredEvaluations = data.evaluations.filter(item => {
                return item.timestamp && new Date(item.timestamp) > cutoffDate;
            });
            
            localStorage.setItem(DB_KEY, JSON.stringify({ 
                evaluations: filteredEvaluations 
            }));
        }
        
        function saveDraft(evaluator, employee, draftData) {
            const draftKey = `EGG_DRAFT_${evaluator}_${employee}`;
            const draftObj = {
                ...draftData,
                timestamp: new Date().toISOString()
            };
            localStorage.setItem(draftKey, JSON.stringify(draftObj));
        }
        
        function loadDraft(evaluator, employee) {
            const draftKey = `EGG_DRAFT_${evaluator}_${employee}`;
            const saved = localStorage.getItem(draftKey);
            if (!saved) return null;
            
            const draft = JSON.parse(saved);
            // Remove drafts older than 7 days
            const draftDate = new Date(draft.timestamp);
            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - 7);
            
            if (draftDate < cutoffDate) {
                localStorage.removeItem(draftKey);
                return null;
            }
            
            return draft;
        }
        
        function categorizeByPosition(position) {
            const pos = position.toUpperCase();
            if (pos.includes('MANAGER')) return 'Manager';
            if (pos.includes('SPV') || pos.includes('SUPERVISOR')) return 'SPV';
            if (pos.includes('FREELANCE') || pos.includes('FREELANCER')) return 'Freelance';
            if (pos.includes('OUTLET')) return 'Outlet';
            return 'Karyawan';
        }
        
        function updateDraft(index) {
            const evaluator = document.getElementById('selectedName').innerText;
            const employee = userData[index].nama;
            const keys = ['ss1','ss2','ss3','ss4','hs1','hs2','hs3','hs4','at1','at2','at3','at4','at5','sholat','puasa'];
            const draftData = {};
            
            keys.forEach(k => {
                const el = document.getElementById(`${k}-${index}`);
                draftData[k] = el ? el.value : '';
            });
            
            const hasAny = keys.some(k => draftData[k]);
            if (hasAny) {
                saveDraft(evaluator, employee, draftData);
            }
        }
        
        function restoreDraft(index) {
            const evaluator = document.getElementById('selectedName').innerText;
            const employee = userData[index].nama;
            const draft = loadDraft(evaluator, employee);
            
            if (!draft) return;
            
            ['ss1','ss2','ss3','ss4','hs1','hs2','hs3','hs4','at1','at2','at3','at4','at5','sholat','puasa'].forEach(key => {
                const fullId = `${key}-${index}`;
                if (draft[key]) {
                    const el = document.getElementById(fullId);
                    const btn = document.getElementById(`btn-${fullId}`);
                    if (el && btn) {
                        el.value = draft[key];
                        const color = VALUE_COLORS[draft[key]];
                        btn.innerHTML = `<span style="color: ${color || 'var(--text)'}">${draft[key]}</span>`;
                        btn.style.borderColor = color || 'var(--border)';
                    }
                }
            });
        }
        
        function updateCardAverage(index) {
            const keys = ['ss1','ss2','ss3','ss4','hs1','hs2','hs3','hs4','at1','at2','at3','at4','at5'];
            const scores = [];
            
            keys.forEach(k => {
                const el = document.getElementById(`${k}-${index}`);
                if (el && el.value) {
                    scores.push(predicateToNumber(el.value));
                }
            });
            
            const avgEl = document.getElementById(`avg-${index}`);
            if (scores.length > 0 && avgEl) {
                const avg = scores.reduce((a,b) => a+b, 0) / scores.length;
                const predicate = numberToPredicate(avg);
                const color = VALUE_COLORS[predicate];
                avgEl.innerHTML = `<span style="color: ${color}">${predicate.charAt(0)}</span>`;
                avgEl.title = `Rata-rata: ${predicate}`;
            } else if (avgEl) {
                avgEl.innerHTML = '<span class="text-gray-400">-</span>';
            }
        }

        window.onload = async () => {
            checkTheme();
            // Clean up old data (older than 1 month)
            cleanupOldData();
            const res = await fetch(API_URL + "?action=getUsers");
            const result = await res.json();
            const evals = result.data.filter(u => u.posisi.toUpperCase().includes('MANAGER') || u.posisi.toUpperCase().includes('SPV'));
            document.getElementById('evaluatorList').innerHTML = evals.map(u => `
                <div class="p-4 hover:bg-[var(--surface2)] cursor-pointer" onclick="selectEvaluator('${u.nama}')">
                    <span class="font-bold text-sm block">${u.nama}</span>
                    <span class="text-[9px] text-[var(--text-muted)] uppercase">${u.posisi}</span>
                </div>
            `).join('');
        };

        async function switchTab(tab) {
            if (tab === 'leaderboard' || tab === 'ranking') {
                if (!sessionStorage.getItem('EGG_AUTH')) {
                    const pass = prompt("Password Manager:");
                    if (pass === MANAGER_PASS) sessionStorage.setItem('EGG_AUTH', 'true');
                    else return alert("Salah!");
                }
                
                // Set default date filter to current month
                const now = new Date();
                const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
                const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);
                const fromDateStr = firstDay.toISOString().split('T')[0];
                const toDateStr = lastDay.toISOString().split('T')[0];
                
                if (tab === 'leaderboard') {
                    document.getElementById('filterDateFrom').value = fromDateStr;
                    document.getElementById('filterDateTo').value = toDateStr;
                    await renderLeaderboard(fromDateStr, toDateStr);
                }
                if (tab === 'ranking') {
                    document.getElementById('filterDateFromRanking').value = fromDateStr;
                    document.getElementById('filterDateToRanking').value = toDateStr;
                    await renderRanking(fromDateStr, toDateStr);
                }
            }
            const isP = tab === 'penilaian';
            const isL = tab === 'leaderboard';
            const isR = tab === 'ranking';
            
            document.getElementById('penilaianContent').classList.toggle('hidden', !isP);
            document.getElementById('leaderboardSection').classList.toggle('hidden', !isL);
            document.getElementById('rankingSection').classList.toggle('hidden', !isR);
            
            document.getElementById('tab-p').className = isP ? "px-6 py-3 rounded-2xl font-bold bg-[var(--primary)] text-white shadow-lg" : "px-6 py-3 rounded-2xl font-bold bg-[var(--surface)] text-[var(--text-muted)] border border-[var(--border)]";
            document.getElementById('tab-l').className = isL ? "px-6 py-3 rounded-2xl font-bold bg-[var(--primary)] text-white shadow-lg flex items-center gap-2" : "px-6 py-3 rounded-2xl font-bold bg-[var(--surface)] text-[var(--text-muted)] border border-[var(--border)] flex items-center gap-2";
            document.getElementById('tab-r').className = isR ? "px-6 py-3 rounded-2xl font-bold bg-[var(--primary)] text-white shadow-lg flex items-center gap-2" : "px-6 py-3 rounded-2xl font-bold bg-[var(--surface)] text-[var(--text-muted)] border border-[var(--border)] flex items-center gap-2";
        }

        async function selectEvaluator(name) {
            document.getElementById('selectedName').innerText = name;
            document.getElementById('selectMenu').classList.add('hidden');
            const res = await fetch(API_URL + "?action=getUsers&penilai=" + encodeURIComponent(name));
            const result = await res.json();
            userData = result.data;
            await renderCards();
            // Restore drafts and calculate averages
            userData.forEach((u, i) => {
                restoreDraft(i);
                updateCardAverage(i);
            });
            document.getElementById('matrixSection').classList.remove('opacity-30', 'pointer-events-none');
            document.getElementById('submitContainer').classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
        }

        async function renderCards() {
            const evaluator = document.getElementById('selectedName').innerText;
            const savedData = await loadEvaluationsFromAPI();
            
            document.getElementById('karyawanContainer').innerHTML = userData.map((u, i) => {
                const hasEval = hasEvaluation(evaluator, u.nama, savedData);
                const isRecentEval = isRecentlyEvaluated(evaluator, u.nama, savedData);
                const draft = loadDraft(evaluator, u.nama);
                const category = categorizeByPosition(u.posisi);
                
                // Find existing evaluation data
                const existingEval = savedData.find(item => 
                    item.penilai === evaluator && item.yangDinilai === u.nama
                );
                
                let statusBadge = '';
                let statusClass = '';
                
                if (hasEval && existingEval) {
                    if (isRecentEval) {
                        statusBadge = 'Sudah Dinilai';
                        statusClass = 'bg-green-100 text-green-700 border-green-300';
                    } else {
                        statusBadge = 'Data Lama (>30 hari)';
                        statusClass = 'bg-gray-100 text-gray-600 border-gray-300';
                    }
                } else if (draft) {
                    statusBadge = 'Draft Tersimpan';

            };
            const cats = [{ k: 'ss', c: 4 }, { k: 'hs', c: 4 }, { k: 'at', c: 5 }];
            let html = `<div class="grid grid-cols-2 gap-x-4 gap-y-3">`;
            cats.forEach(cat => {

        // Date filtering functions
        function filterDataByDate(data, fromDate, toDate) {
            if (!fromDate && !toDate) return data;
            
            const from = fromDate ? new Date(fromDate) : new Date('1970-01-01');
            const to = toDate ? new Date(toDate) : new Date();
            to.setHours(23, 59, 59, 999);
            
            return data.filter(item => {
                if (!item.timestamp) return false;
                const itemDate = new Date(item.timestamp);
                return itemDate >= from && itemDate <= to;
            });
        }

                // Save to API
                let successCount = 0;
                let failCount = 0;
                let errorMessages = [];
                
                for (const evaluation of batch) {
                    const result = await saveEvaluationToAPI(evaluation);
                    console.log("Save result:", result);
                    if (result.success) {
                        successCount++;
                    } else {
                        failCount++;
                        if (result.error) {
                            errorMessages.push(result.error);
                        }
                    }
                }
                
                console.log("Save complete. Success:", successCount, "Failed:", failCount);
                
                // Clear drafts after successful submission
                batch.forEach(item => {
                    const draftKey = `EGG_DRAFT_${item.penilai}_${item.yangDinilai}`;
                    localStorage.removeItem(draftKey);
                });
                
                // Clear localStorage cache to force fresh data fetch from API on reload
                localStorage.removeItem(DB_KEY);
                
                if (failCount > 0) {
                    const uniqueErrors = [...new Set(errorMessages)].slice(0, 3).join('\n');
                    alert(`Peringatan: ${successCount} data berhasil, ${failCount} data gagal.\n\nError:\n${uniqueErrors || 'Unknown error'}\n\nData disimpan di localStorage.`);
                } else {
                    alert(`Data Berhasil Disimpan!\n${successCount} data tersimpan ke API.`); 
                }
                location.reload();
            } catch (error) {
                console.error("Error saving data:", error);
                alert("Terjadi error saat menyimpan data: " + error.message + ". Data disimpan di localStorage sebagai backup.");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

// API Functions for Google Sheets integration
async function loadEvaluationsFromAPI() {
    try {
        console.log("Loading evaluations from API...");
        const response = await fetch(API_URL + "?action=getEvaluations");
        const result = await response.json();
        
        console.log("API Response:", result);
        
        if (result.status === "success") {
            console.log("Loaded " + result.data.length + " evaluations from API");
            console.log("First evaluation:", result.data[0]);
            // Also save to localStorage as backup
            if (result.data && result.data.length > 0) {
                localStorage.setItem(DB_KEY, JSON.stringify({ evaluations: result.data }));
            }
            return result.data;
        } else {
            console.error("API returned error:", result.message);
            // Fallback to localStorage
            const raw = localStorage.getItem(DB_KEY);
            return raw ? JSON.parse(raw).evaluations : [];
        }
    } catch (error) {
        console.error("Failed to load evaluations from API:", error);
        // Fallback to localStorage
        const raw = localStorage.getItem(DB_KEY);
        return raw ? JSON.parse(raw).evaluations : [];
    }
}

async function saveEvaluationToAPI(evaluation) {
    try {
        console.log("Sending evaluation to API:", evaluation);
        
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'text/plain',
            },
            body: JSON.stringify({
                action: "saveEvaluation",
                data: evaluation
            }),
            redirect: 'follow'
        });
        
        console.log("API Response status:", response.status);
        
        const result = await response.json();
        console.log("API Response:", result);
        
        // Also save to localStorage as backup
        const raw = localStorage.getItem(DB_KEY);
        const existingData = raw ? JSON.parse(raw).evaluations : [];
        localStorage.setItem(DB_KEY, JSON.stringify({ evaluations: [...existingData, evaluation] }));
        
        if (result.status !== "success") {
            console.error("API returned error:", result.message);
            return { success: false, error: result.message || 'API error' };
        }
        
        return { success: true };
    } catch (error) {
        console.error("Failed to save evaluation to API:", error);
        // Save to localStorage as fallback
        const raw = localStorage.getItem(DB_KEY);
        const existingData = raw ? JSON.parse(raw).evaluations : [];
        localStorage.setItem(DB_KEY, JSON.stringify({ evaluations: [...existingData, evaluation] }));
        return { success: false, error: error.message || 'Network error' };
    }
}

function checkTheme() { const isD = localStorage.getItem('EGG_THEME') === 'dark'; if(isD) document.getElementById('htmlRoot').classList.add('dark'); document.getElementById('iconSun').classList.toggle('hidden', !isD); document.getElementById('iconMoon').classList.toggle('hidden', isD); }

document.addEventListener('click', () => { document.getElementById('selectMenu').classList.add('hidden'); if(activeCsel) document.getElementById(`menu-${activeCsel}`).classList.add('hidden'); activeCsel = null; });
