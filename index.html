<!DOCTYPE html>
<html lang="en" id="htmlRoot">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EASY GOING GROUP - Penilaian Kinerja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #eef3ee;
            --surface: #ffffff;
            --surface2: #f4f8f4;
            --border: #d0e4d0;
            --primary: #2d6a4f;
            --primary-light: #52b788;
            --accent: #f4a261;
            --accent-dark: #e76f51;
            --text: #1c2b1c;
            --text-muted: #6b7c6b;
            --shadow: 0 2px 16px rgba(45, 106, 79, 0.08);
            --shadow-hover: 0 8px 28px rgba(45, 106, 79, 0.16);
        }

        html.dark {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #1c2128;
            --border: #2a3a2a;
            --primary: #52b788;
            --primary-light: #74c69d;
            --accent: #f4a261;
            --accent-dark: #e76f51;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 8px 28px rgba(82, 183, 136, 0.14);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s, transform 0.3s;
        }

        .card-hover:hover {
            box-shadow: var(--shadow-hover);
            border-color: var(--primary-light);
            transform: translateY(-2px);
        }

        .btn-accent {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-accent:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(244,162,97,0.4); }
        .btn-accent:active { transform: scale(0.97); }

        /* ── CUSTOM SELECT ─────────────────────────── */
        .csel-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 9px 12px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            text-align: left;
        }
        .csel-btn:hover {
            border-color: var(--primary-light);
            background: var(--surface2);
        }
        .csel-btn.has-value {
            border-color: var(--border);
        }
        .csel-btn.open {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(82,183,136,0.18);
        }
        .csel-btn svg {
            flex-shrink: 0;
            color: var(--text-muted);
            transition: transform 0.2s;
        }
        .csel-btn.open svg { transform: rotate(180deg); }

        .csel-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .csel-lbl {
            display: flex;
            align-items: center;
            gap: 7px;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .csel-menu {
            position: fixed;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.18);
            z-index: 9999;
            overflow-y: auto;
            overflow-x: hidden;
            max-height: 220px;
            min-width: 200px;
            animation: cselIn 0.15s ease-out;
        }

        @keyframes cselIn {
            from { opacity: 0; transform: translateY(-6px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .csel-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            transition: background 0.12s;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }
        .csel-item:hover { background: var(--surface2); }
        .csel-item.selected { background: rgba(82,183,136,0.1); }
        /* ─────────────────────────────────────────── */

        input[type="text"] {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            padding: 10px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(82,183,136,0.18);
        }

        .badge-waiting {
            background: rgba(107,124,107,0.12);
            color: var(--text-muted);
            border: 1px solid rgba(107,124,107,0.25);
        }
        .badge-draft {
            background: rgba(244,162,97,0.15);
            color: var(--accent-dark);
            border: 1px solid rgba(244,162,97,0.35);
        }

        .avatar-chip { background: linear-gradient(135deg, var(--primary), var(--primary-light)); }

        .section-label {
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        #evaluatorList div {
            color: var(--text);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s, padding-left 0.15s, color 0.15s;
        }
        #evaluatorList div:hover {
            background: rgba(82,183,136,0.12);
            color: var(--primary);
            padding-left: 1.5rem;
        }

        .floating-submit { position: fixed; bottom: 2rem; right: 2rem; z-index: 50; }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-light); }
    </style>
</head>

<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">

        <!-- HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div class="fade-in">
                <h1 class="text-4xl font-extrabold tracking-tighter italic" style="color: var(--text)">
                    EASY GOING <span style="color: var(--primary)">GROUP</span>
                </h1>
                <p class="text-sm font-medium mt-1 uppercase tracking-widest" style="color: var(--text-muted)">
                    Sistem Penilaian Kinerja Karyawan
                </p>
            </div>

            <div class="flex items-center gap-3 fade-in">
                <button id="themeToggle" onclick="toggleTheme()"
                    class="card rounded-2xl p-2.5 cursor-pointer flex items-center justify-center" title="Toggle tema">
                    <svg id="iconSun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color: var(--accent)">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                    <svg id="iconMoon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color: var(--primary)">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                </button>

                <div id="statusBadge" class="card px-5 py-2 rounded-2xl flex items-center gap-3 text-sm font-bold">
                    <span class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75"
                            style="background: var(--primary-light)"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3" style="background: var(--primary)"></span>
                    </span>
                    <span id="statusText" style="color: var(--text)">Menghubungkan...</span>
                </div>
            </div>
        </header>

        <!-- Backdrop for evaluator dropdown -->
        <div id="dropdownBackdrop" class="hidden fixed inset-0"
            style="z-index: 99; background: rgba(0,0,0,0.08); backdrop-filter: blur(1px);"
            onclick="closeDropdown()"></div>

        <!-- EVALUATOR SELECT -->
        <section class="mb-10 fade-in" style="animation-delay: 0.1s; position: relative; z-index: 100;">
            <div class="card p-6 rounded-3xl">
                <label class="section-label mb-4 block" style="color: var(--primary)">
                    Identitas Penilai (SPV / Manager)
                </label>

                <div class="relative" id="customSelectWrapper">
                    <button id="selectButton"
                        class="w-full text-left rounded-2xl p-4 text-xl font-bold flex justify-between items-center transition-all"
                        style="background: var(--surface2); border: 1px solid var(--border); color: var(--text);">
                        <span id="selectedName" style="color: var(--text-muted)">Pilih Nama Anda...</span>
                        <svg class="w-6 h-6 transition-transform" id="selectArrow" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24" style="color: var(--text-muted)">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>

                    <div id="selectMenu"
                        class="hidden absolute top-full left-0 right-0 mt-3 card rounded-2xl z-[100] overflow-hidden"
                        style="border-color: var(--primary-light)">
                        <div class="p-3" style="border-bottom: 1px solid var(--border); background: var(--surface)">
                            <input type="text" id="searchEvaluator" placeholder="Cari nama Anda...">
                        </div>
                        <div id="evaluatorList" class="max-h-64 overflow-y-auto p-2 space-y-1"
                            style="background: var(--surface)"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- KARYAWAN MATRIX -->
        <div id="matrixSection" class="opacity-30 pointer-events-none transition-all duration-700">
            <div class="flex justify-between items-end mb-6 fade-in" style="animation-delay: 0.2s">
                <div>
                    <h2 class="text-2xl font-bold tracking-tight" style="color: var(--text)">Daftar Karyawan</h2>
                    <p class="text-sm" style="color: var(--text-muted)">
                        Pilih nama karyawan untuk memberikan penilaian bulanan.
                    </p>
                </div>
                <div class="card px-4 py-1.5 rounded-xl"
                    style="border-color: var(--primary-light); background: rgba(82,183,136,0.08)">
                    <span class="section-label" style="color: var(--primary)">Antrean: </span>
                    <span id="totalKaryawan" class="text-lg font-black" style="color: var(--primary)">0</span>
                </div>
            </div>

            <div id="karyawanContainer" class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-32 fade-in"
                style="animation-delay: 0.3s"></div>
        </div>
    </div>

    <!-- SUBMIT BUTTON -->
    <div id="submitContainer" class="floating-submit opacity-0 transition-all duration-500 scale-90 translate-y-10">
        <button id="btnSubmit" class="btn-accent px-8 py-4 rounded-2xl font-black text-lg flex items-center gap-3">
            <span>KIRIM PENILAIAN</span>
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
        </button>
    </div>

    <script>
        // === THEME ===
        const htmlRoot = document.getElementById('htmlRoot');
        if (localStorage.getItem('EGG_THEME') === 'dark') htmlRoot.classList.add('dark');
        updateThemeIcons();

        function toggleTheme() {
            htmlRoot.classList.toggle('dark');
            localStorage.setItem('EGG_THEME', htmlRoot.classList.contains('dark') ? 'dark' : 'light');
            updateThemeIcons();
        }
        function updateThemeIcons() {
            const dark = htmlRoot.classList.contains('dark');
            document.getElementById('iconSun').classList.toggle('hidden', !dark);
            document.getElementById('iconMoon').classList.toggle('hidden', dark);
        }

        // === CUSTOM SELECT (form fields) ===
        const VALUE_COLORS = {
            '1 (Sangat Buruk)': '#ef4444',
            '2 (Buruk)':        '#f97316',
            '4 (Baik)':         '#3b82f6',
            '5 (Sangat Baik)':  '#22c55e',
            'Tidak Pernah':     '#ef4444',
            'Jarang':           '#f97316',
            '5 Waktu':          '#3b82f6',
            'Tepat Waktu':      '#22c55e',
            'Bolong':           '#f97316',
            'Full':             '#22c55e',
        };

        let activeCsel = null;

        function positionCsel(id) {
            const btn  = document.getElementById('csel-btn-' + id);
            const menu = document.getElementById('csel-menu-' + id);
            if (!btn || !menu) return;
            const rect    = btn.getBoundingClientRect();
            const menuW   = Math.max(rect.width, 200);
            const pad     = 8;

            // Horizontal: shift left if overflows right edge
            let left = rect.left;
            if (left + menuW > window.innerWidth - pad) {
                left = window.innerWidth - menuW - pad;
            }
            if (left < pad) left = pad;

            // Vertical: flip up if not enough space below
            const spaceBelow = window.innerHeight - rect.bottom;
            const menuH      = Math.min(220, menu.scrollHeight + 2);
            if (spaceBelow < menuH + 10 && rect.top > menuH + 10) {
                menu.style.top = (rect.top - menuH - 6) + 'px';
            } else {
                menu.style.top = (rect.bottom + 6) + 'px';
            }

            menu.style.left  = left + 'px';
            menu.style.width = menuW + 'px';
        }

        function toggleCsel(id, e) {
            e.stopPropagation();
            const menu = document.getElementById('csel-menu-' + id);
            const btn  = document.getElementById('csel-btn-' + id);
            const isOpen = !menu.classList.contains('hidden');

            // Close any other open menu
            if (activeCsel && activeCsel !== id) {
                document.getElementById('csel-menu-' + activeCsel)?.classList.add('hidden');
                document.getElementById('csel-btn-'  + activeCsel)?.classList.remove('open');
            }

            if (isOpen) {
                menu.classList.add('hidden');
                btn.classList.remove('open');
                activeCsel = null;
            } else {
                menu.classList.remove('hidden');
                positionCsel(id);
                btn.classList.add('open');
                activeCsel = id;
            }
        }

        // Reposition on scroll/resize
        window.addEventListener('scroll', () => { if (activeCsel) positionCsel(activeCsel); }, true);
        window.addEventListener('resize', () => { if (activeCsel) positionCsel(activeCsel); });

        function setCsel(id, value, index) {
            applyCselValue(id, value);
            document.getElementById('csel-menu-' + id)?.classList.add('hidden');
            document.getElementById('csel-btn-'  + id)?.classList.remove('open');
            activeCsel = null;
            updateProgress(index);
        }

        function applyCselValue(id, value) {
            const hidden = document.getElementById(id);
            if (hidden) hidden.value = value;

            const lbl = document.getElementById('csel-lbl-' + id);
            if (!lbl) return;

            const color = VALUE_COLORS[value];
            const dot   = color ? `<span class="csel-dot" style="background:${color}"></span>` : '';
            lbl.innerHTML = dot + value;
            lbl.style.color = color || 'var(--text)';

            const btn = document.getElementById('csel-btn-' + id);
            if (btn) btn.classList.add('has-value');

            // Update selected state in menu
            const menu = document.getElementById('csel-menu-' + id);
            if (menu) {
                menu.querySelectorAll('.csel-item').forEach(el => {
                    el.classList.toggle('selected', el.dataset.val === value);
                });
            }
        }

        // Close all csel on outside click
        document.addEventListener('click', () => {
            if (activeCsel) {
                document.getElementById('csel-menu-' + activeCsel)?.classList.add('hidden');
                document.getElementById('csel-btn-'  + activeCsel)?.classList.remove('open');
                activeCsel = null;
            }
        });

        function makeCsel(id, options, index, placeholder) {
            const items = options.map(v => {
                const color = VALUE_COLORS[v];
                const dot   = color ? `<span class="csel-dot" style="background:${color}"></span>` : '';
                return `<div class="csel-item" data-val="${v}" onclick="setCsel('${id}',${JSON.stringify(v)},${index})">${dot}${v}</div>`;
            }).join('');

            return `
                <div>
                    <input type="hidden" id="${id}">
                    <button type="button" id="csel-btn-${id}" class="csel-btn"
                        onclick="toggleCsel('${id}', event)">
                        <span id="csel-lbl-${id}" class="csel-lbl">${placeholder}</span>
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>
                    <div id="csel-menu-${id}" class="csel-menu hidden">${items}</div>
                </div>`;
        }

        // === APP ===
        const API_URL = "https://script.google.com/macros/s/AKfycbzEPU2KKfFlBBLekUgN-nVUVW_btEoMTMrqOPDoj81hUyt6sqvGgS35PApo9sNeDbqG/exec";

        const metrics = {
            ss: ['Komunikasi dengan rekan & atasan', 'Kerja sama tim', 'Tanggung jawab & manajemen waktu', 'Inisiatif & penyelesaian masalah'],
            hs: ['Penguasaan tugas & SOP', 'Ketelitian & kecepatan kerja', 'Kemampuan menggunakan alat/sistem', 'Konsistensi hasil kerja'],
            at: ['Kedisiplinan & kehadiran', 'Kepatuhan aturan & arahan', 'Etika & profesionalitas', 'Tanggung jawab lingkungan']
        };
        const opsiNilai  = ['1 (Sangat Buruk)', '2 (Buruk)', '4 (Baik)', '5 (Sangat Baik)'];
        const opsiSholat = ['Tidak Pernah', 'Jarang', '5 Waktu', 'Tepat Waktu'];
        const opsiPuasa  = ['Tidak Pernah', 'Bolong', 'Full'];

        let userData = [], evaluators = [];

        window.onload = async () => {
            try {
                const res    = await fetch(API_URL + "?action=getUsers");
                const result = await res.json();
                if (result.status === "success") {
                    evaluators = result.data.filter(u =>
                        u.posisi.toUpperCase().includes('MANAGER') || u.posisi.toUpperCase().includes('SPV'));
                    renderEvaluatorOptions(evaluators);
                    document.getElementById('statusText').innerText = "Sistem Siap";
                }
            } catch (e) { document.getElementById('statusText').innerText = "Link Error"; }
        };

        // EVALUATOR CUSTOM SELECT
        const selectBtn   = document.getElementById('selectButton');
        const selectMenu  = document.getElementById('selectMenu');
        const selectArrow = document.getElementById('selectArrow');
        const backdrop    = document.getElementById('dropdownBackdrop');

        function openDropdown() {
            selectMenu.classList.remove('hidden');
            selectArrow.classList.add('rotate-180');
            backdrop.classList.remove('hidden');
        }
        function closeDropdown() {
            selectMenu.classList.add('hidden');
            selectArrow.classList.remove('rotate-180');
            backdrop.classList.add('hidden');
        }

        selectBtn.addEventListener('click', e => {
            e.stopPropagation();
            selectMenu.classList.contains('hidden') ? openDropdown() : closeDropdown();
        });
        selectMenu.addEventListener('click',     e => e.stopPropagation());
        selectMenu.addEventListener('mousedown', e => e.stopPropagation());

        function renderEvaluatorOptions(list) {
            document.getElementById('evaluatorList').innerHTML = list.map(u => `
                <div class="p-4 text-sm font-semibold" onclick="selectEvaluator('${u.nama}')">
                    ${u.nama}
                    <span class="text-[10px] block" style="color: var(--text-muted)">${u.posisi}</span>
                </div>
            `).join('');
        }

        document.getElementById('searchEvaluator').oninput = e => {
            const val = e.target.value.toLowerCase();
            renderEvaluatorOptions(evaluators.filter(u => u.nama.toLowerCase().includes(val)));
        };

        async function selectEvaluator(name) {
            const nameEl = document.getElementById('selectedName');
            nameEl.innerText = name;
            nameEl.style.color = 'var(--text)';
            closeDropdown();
            document.getElementById('statusText').innerText = "Memuat Daftar...";

            try {
                const res    = await fetch(API_URL + "?action=getUsers&penilai=" + encodeURIComponent(name));
                const result = await res.json();
                userData = result.data;
                renderCards();
                document.getElementById('matrixSection').style.opacity = "1";
                document.getElementById('matrixSection').style.pointerEvents = "auto";
                document.getElementById('submitContainer').classList.remove('opacity-0', 'translate-y-10', 'scale-90');
                document.getElementById('statusText').innerText = "Terverifikasi";
            } catch (e) { alert("Gagal memuat data."); }
        }

        function renderCards() {
            const container = document.getElementById('karyawanContainer');
            container.innerHTML = '';
            document.getElementById('totalKaryawan').innerText = userData.length;

            userData.forEach((user, index) => {
                const card = document.createElement('div');
                card.className = "card card-hover rounded-3xl overflow-hidden group";
                card.innerHTML = `
                    <div class="p-5 cursor-pointer flex justify-between items-center" onclick="toggleCard(${index})">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl avatar-chip flex items-center justify-center font-bold text-lg text-white shadow-md">
                                ${user.nama.charAt(0)}
                            </div>
                            <div>
                                <h3 class="font-bold" style="color: var(--text)">${user.nama}</h3>
                                <p class="text-[10px] font-black uppercase tracking-widest" style="color: var(--text-muted)">${user.posisi}</p>
                            </div>
                        </div>
                        <div id="status-${index}" class="badge-waiting text-[10px] font-bold px-3 py-1 rounded-full uppercase transition-all">Menunggu</div>
                    </div>
                    <div id="content-${index}" class="hidden overflow-hidden transition-all duration-500"
                        style="background: var(--surface2); border-top: 1px solid var(--border)">
                        <div class="p-6 space-y-6">
                            ${generateFields(index)}
                        </div>
                    </div>
                `;
                container.appendChild(card);
                restoreDraft(index);
            });
        }

        function toggleCard(index) {
            const content = document.getElementById(`content-${index}`);
            const hidden  = content.classList.contains('hidden');
            content.classList.toggle('hidden', !hidden);
            content.style.maxHeight = hidden ? "3000px" : "0";
        }

        function generateFields(index) {
            const cats = [
                { key: 'ss', label: 'Soft Skill', color: 'var(--primary)' },
                { key: 'hs', label: 'Hard Skill', color: '#7c3aed' },
                { key: 'at', label: 'Attitude',   color: '#db2777' }
            ];
            let html = `<div class="grid grid-cols-1 gap-6">`;
            cats.forEach(({ key, label, color }) => {
                html += `<div>
                    <h4 class="section-label mb-3" style="color:${color}">${label}</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        ${metrics[key].map((q, i) => `
                            <div class="space-y-1.5">
                                <label class="text-[11px] font-medium" style="color:var(--text-muted)">${q}</label>
                                ${makeCsel(`${key}${i+1}-${index}`, opsiNilai, index, 'Nilai...')}
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            });
            html += `
                <div class="pt-4" style="border-top: 1px solid var(--border)">
                    <h4 class="section-label mb-3" style="color:var(--accent-dark)">Ibadah</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div class="space-y-1.5">
                            <label class="text-[11px] font-medium" style="color:var(--text-muted)">Melaksanakan Sholat</label>
                            ${makeCsel(`sholat-${index}`, opsiSholat, index, 'Pilih Status...')}
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[11px] font-medium" style="color:var(--text-muted)">Melaksanakan Puasa</label>
                            ${makeCsel(`puasa-${index}`, opsiPuasa, index, 'Pilih Status...')}
                        </div>
                    </div>
                </div>
            </div>`;
            return html;
        }

        function updateProgress(index) {
            const penilai    = document.getElementById('selectedName').innerText;
            const targetName = userData[index].nama;
            const keys = ['ss1','ss2','ss3','ss4','hs1','hs2','hs3','hs4','at1','at2','at3','at4','sholat','puasa'];
            const draftObj = {};
            keys.forEach(k => {
                const el = document.getElementById(`${k}-${index}`);
                draftObj[k] = el ? el.value : '';
            });
            localStorage.setItem(`EGG_DRAFT_${penilai}_${targetName}`, JSON.stringify(draftObj));
            const status = document.getElementById(`status-${index}`);
            status.innerText = "Draft Tersimpan";
            status.className = "badge-draft text-[10px] font-bold px-3 py-1 rounded-full uppercase";
        }

        function restoreDraft(index) {
            const penilai    = document.getElementById('selectedName').innerText;
            const targetName = userData[index].nama;
            const saved      = localStorage.getItem(`EGG_DRAFT_${penilai}_${targetName}`);
            if (!saved) return;
            const draftObj = JSON.parse(saved);
            let hasValue   = false;
            ['ss1','ss2','ss3','ss4','hs1','hs2','hs3','hs4','at1','at2','at3','at4','sholat','puasa'].forEach(key => {
                const fullId = `${key}-${index}`;
                if (draftObj[key]) {
                    applyCselValue(fullId, draftObj[key]);
                    hasValue = true;
                }
            });
            if (hasValue) {
                const status = document.getElementById(`status-${index}`);
                status.innerText = "Draft Tersimpan";
                status.className = "badge-draft text-[10px] font-bold px-3 py-1 rounded-full uppercase";
            }
        }

        document.getElementById('btnSubmit').onclick = async () => {
            const penilai = document.getElementById('selectedName').innerText;
            const btn     = document.getElementById('btnSubmit');
            let batch     = [];

            userData.forEach((u, i) => {
                const ss1 = document.getElementById(`ss1-${i}`)?.value;
                if (!ss1) return;
                batch.push({
                    penilai, yangDinilai: u.nama,
                    ss1,
                    ss2: document.getElementById(`ss2-${i}`).value,
                    ss3: document.getElementById(`ss3-${i}`).value,
                    ss4: document.getElementById(`ss4-${i}`).value,
                    hs1: document.getElementById(`hs1-${i}`).value,
                    hs2: document.getElementById(`hs2-${i}`).value,
                    hs3: document.getElementById(`hs3-${i}`).value,
                    hs4: document.getElementById(`hs4-${i}`).value,
                    at1: document.getElementById(`at1-${i}`).value,
                    at2: document.getElementById(`at2-${i}`).value,
                    at3: document.getElementById(`at3-${i}`).value,
                    at4: document.getElementById(`at4-${i}`).value,
                    sholat: document.getElementById(`sholat-${i}`).value,
                    puasa:  document.getElementById(`puasa-${i}`).value
                });
            });

            if (!batch.length) return alert("Pilih minimal satu karyawan dan berikan nilai.");

            btn.innerHTML = `<span>Mengirim ${batch.length} Data...</span>`;
            btn.disabled  = true;

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ data: batch })
                });
                batch.forEach(item => localStorage.removeItem(`EGG_DRAFT_${penilai}_${item.yangDinilai}`));
                alert("Data berhasil dikirim ke database.");
                location.reload();
            } catch (e) {
                alert("Kesalahan koneksi.");
                btn.innerHTML = `<span>KIRIM PENILAIAN</span><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>`;
                btn.disabled = false;
            }
        };
    </script>
</body>

</html>
